<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="shan — A premium personal virtual assistant.">
    <title>shan</title>
    <!-- Cool S-type neon favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23bffe1b'/><stop offset='100%25' stop-color='%23bba6ff'/></linearGradient></defs><rect width='100' height='100' rx='28' fill='%23000000'/><path d='M65,36 C60,25 48,24 38,32 C26,42 46,52 52,57 C58,62 72,70 64,80 C56,90 42,88 35,78' fill='none' stroke='url(%23g)' stroke-width='12' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=1.0.7">
</head>
<body>
<div class="app">

    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-left">
            <div class="user-greeting">
                <span class="user-name">Hi, Shani</span>
                <span class="wave-hand">👋</span>
            </div>
        </div>
        <div class="topbar-right">
            <!-- Admin Toggle -->
            <button class="icon-btn" id="adminToggle" title="Admin panel">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </button>
            <!-- Theme Toggle -->
            <button class="icon-btn" id="themeToggle" title="Toggle theme">
                <span class="dark-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
                <span class="light-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
            </button>
            <!-- Clear Chat -->
            <button class="icon-btn clear-btn" id="clearBtn" style="display:none" title="Clear chat">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
            <!-- User Avatar -->
            <div class="user-avatar" id="avatarBtn">S</div>
        </div>
    </header>

    <!-- ── Admin Status Banner ──────────────────────────────── -->
    <div class="admin-banner" id="adminBanner" style="display:none">
        <span class="status-dot"></span>
        <span>Developer Mode — Live API Telemetry & Metadata Enabled</span>
    </div>

    <!-- ── Main Chat Area ───────────────────────────────────── -->
    <div class="messages-scroll" id="messagesScroll">
        <div class="messages-inner">

            <!-- Welcome Screen (Minimal Clean Layout) -->
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-orb-container">
                    <div class="orb-backdrop-glow"></div>
                    <div class="orb-topo-lines"></div>
                    <div class="welcome-orb">
                        <div class="orb-ring"></div>
                        <div class="orb-core">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <h1 class="welcome-heading">How may I help<br>you today?</h1>
                <p class="welcome-sub">I am shan, your virtual assistant.</p>
            </div>

            <!-- Active Messages -->
            <div id="messagesContainer"></div>

            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="loading-wrap" style="display:none">
                <div class="ai-avatar-sm">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                </div>
                <div class="loading-dots">
                    <div class="ld"></div><div class="ld"></div><div class="ld"></div>
                </div>
            </div>

            <div id="messagesEnd"></div>
        </div>
    </div>

    <!-- ── Input Dock ──────────────────────────────────────── -->
    <div class="input-dock">
        <form id="chatForm" class="input-form">
            <div class="input-box" id="inputBox">

                <!-- Model Selector Dropdown -->
                <div class="model-picker" id="modelPicker">
                    <button type="button" class="model-btn" id="modelBtn">
                        <span class="active-model-dot"></span>
                        <span id="modelBtnLabel">Llama 3.3</span>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <!-- Dropdown Content -->
                    <div class="model-dropdown" id="modelDropdown">
                        <div class="dropdown-label">Select Model</div>
                        <button type="button" class="dropdown-item active" data-model="llama" data-label="Llama 3.3">
                            <span class="d-dot bg-lime"></span>
                            <div>
                                <div class="d-name">Llama 3.3 70B</div>
                                <div class="d-sub">llama-3.3-70b-versatile</div>
                            </div>
                            <svg class="d-check" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                        <button type="button" class="dropdown-item" data-model="granite" data-label="Qwen 3">
                            <span class="d-dot bg-lilac"></span>
                            <div>
                                <div class="d-name">Qwen 3 32B</div>
                                <div class="d-sub">qwen/qwen3-32b</div>
                            </div>
                            <svg class="d-check" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                        <button type="button" class="dropdown-item" data-model="mistral" data-label="Llama 3.1">
                            <span class="d-dot bg-coral"></span>
                            <div>
                                <div class="d-name">Llama 3.1 8B</div>
                                <div class="d-sub">llama-3.1-8b-instant</div>
                            </div>
                            <svg class="d-check" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Main Input Textarea -->
                <textarea id="messageInput" class="msg-input"
                    placeholder="Ask shan anything..."
                    rows="1" spellcheck="true" autocomplete="off"></textarea>

                <!-- Glowing Send Button -->
                <button type="submit" id="sendBtn" class="send-btn">
                    <svg id="sendIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/>
                    </svg>
                    <div id="sendSpinner" style="display:none"><div class="spin"></div></div>
                </button>
            </div>
            <p class="input-hint">Press Enter to Send &middot; Shift+Enter for line break</p>
        </form>
    </div>

</div>
<script src="/static/script.js?v=1.0.7"></script>
</body>
</html>
